<!DOCTYPE html>

                <div>
                    <label>Player</label>
                    <select id="name" class="input">
                        <option>Andy</option>
                        <option>Scott</option>
                        <option>Stew</option>
                    </select>
                </div>

                <div>
                    <label>Date</label>
                    <input type="date" id="date" class="input" />
                </div>

                <div>
                    <label>Holes</label>
                    <input type="number" id="holes" class="input" min="1" max="18" />
                </div>

                <div>
                    <label>Comments</label>
                    <input type="text" id="comments" class="input" />
                </div>

            </div>

            <button id="add-round" class="btn-primary mt-6">
                Add Round
            </button>

        </div>

        <!-- ROUNDS -->
        <div class="section-card">

            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">
                    Rounds
                </h2>
            </div>

            <div class="table-shell">

                <table class="table-base">

                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Date</th>
                            <th>Holes</th>
                            <th>Comments</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="rounds-table-body"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
